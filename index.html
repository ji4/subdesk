<!DOCTYPE html>
<html lang="zh-TW" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影片字幕校正工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link rel="icon" type="image/png" href="public/images/Icon.png">
    <link rel="stylesheet" href="style.css">
    <script>
        window.SUBDESK_API_BASE = 'https://your-backend.vercel.app';
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TJNXR7NCT4"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-TJNXR7NCT4');
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <!-- 小螢幕警告介面 -->
    <div class="narrow-screen-gate" id="narrowScreenGate">
        <div class="narrow-screen-inner">
            <img src="public/images/Logo.png" alt="SubDesk" class="narrow-screen-logo">
            <p class="narrow-screen-label">影片字幕校正工具</p>
            <h1 class="narrow-screen-title">建議在電腦上開啟</h1>
            <p class="narrow-screen-desc">本工具專為寬螢幕桌面環境設計，在小螢幕裝置上操作會較為擁擠。</p>
            <p class="narrow-screen-hint">建議最小螢幕寬度：1024px</p>
            <button class="narrow-screen-btn-primary" onclick="dismissNarrowScreenGate()">繼續使用</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="header-brand">
                <div class="header-brand-main">
                    <img src="public/images/Logo.png" alt="SubDesk" class="header-logo">
                    <h1>影片字幕校正工具</h1>
                </div>
                <p>The Smoothest Way to Review Subtitles</p>
            </div>
            <button class="header-reset-btn" onclick="resetPage()" title="清除所有資料並重置頁面">清除</button>
            <div class="header-shortcuts">
                <span class="hint-item"><kbd>Space</kbd> 播放 / 暫停</span>
                <span class="hint-item"><kbd>←</kbd><kbd>→</kbd> 跳 5 秒</span>
                <span class="hint-item"><kbd>A</kbd><kbd>D</kbd> 上 / 下一句</span>
                <span class="hint-item"><kbd>[</kbd><kbd>]</kbd> 降 / 升速率</span>
            </div>
        </div>

        <div class="content-wrapper" id="contentWrapper">
            <!-- 影片區域 -->
            <div class="video-section" id="videoSection">
                <div class="video-load-selector">
                    <button class="active" id="youtubeBtn">YouTube</button>
                    <button id="localVideoBtn">本機影片</button>
                </div>

                <div class="youtube-input" id="youtubeInput">
                    <input type="text" id="youtubeUrl" placeholder="請輸入YouTube影片網址 (如: https://www.youtube.com/watch?v=VIDEO_ID)">
                    <button id="loadVideoBtn" onclick="loadVideo()">載入影片</button>
                </div>

                <div class="local-video-input" id="localVideoInput" style="display: none;">
                    <label class="file-drop-zone" id="fileDropZone" for="localVideoFile">
                        <span id="fileNameDisplay">選擇或拖曳影片至此</span>
                    </label>
                    <input type="file" id="localVideoFile" accept="video/*,audio/*" style="display:none">
                    <button id="loadLocalVideoBtn" onclick="loadLocalVideo()">載入影片</button>
                </div>

                <div id="statusInfo" class="status-info"></div>

                <div id="progressContainer" class="progress-container">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <div id="progressText" class="progress-text"></div>
                </div>

                <div id="videoContainer" class="video-container" style="display: none;">
                    <iframe id="youtubeIframe" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                    <video id="localVideo" controls preload="metadata" style="display: none;">
                        您的瀏覽器不支援影片播放。
                    </video>
                    <div id="subtitleOverlay" class="subtitle-overlay">
                        <div id="subtitleOverlayText" class="subtitle-overlay-text"></div>
                    </div>
                    <div id="videoClickOverlay" class="video-click-overlay" onclick="handleVideoContainerClick()"></div>
                </div>

                <div class="video-controls" id="videoControls" style="display: none;">
                    <button id="playBtn" onclick="controlVideo('play')" title="播放">▶ 播放</button>
                    <button id="pauseBtn" onclick="controlVideo('pause')" title="暫停">⏸ 暫停</button>
                    <button id="backBtn" onclick="controlVideo('back')" title="後退5秒">-5s</button>
                    <button id="forwardBtn" onclick="controlVideo('forward')" title="前進5秒">+5s</button>
                    <div class="current-time" id="currentTime" aria-label="目前播放時間，可輸入時間跳轉">
                        <input class="time-digit" id="timeDigit0" inputmode="numeric" maxlength="1" aria-label="小時十位" value="0">
                        <input class="time-digit" id="timeDigit1" inputmode="numeric" maxlength="1" aria-label="小時個位" value="0">
                        <span class="time-separator">:</span>
                        <input class="time-digit" id="timeDigit2" inputmode="numeric" maxlength="1" aria-label="分鐘十位" value="0">
                        <input class="time-digit" id="timeDigit3" inputmode="numeric" maxlength="1" aria-label="分鐘個位" value="0">
                        <span class="time-separator">:</span>
                        <input class="time-digit" id="timeDigit4" inputmode="numeric" maxlength="1" aria-label="秒數十位" value="0">
                        <input class="time-digit" id="timeDigit5" inputmode="numeric" maxlength="1" aria-label="秒數個位" value="0">
                    </div>
                </div>

                <div id="messages" class="messages"></div>
            </div>

            <!-- 可拖曳分隔線 -->
            <div class="panel-divider" id="panelDivider"></div>

            <!-- 字幕顯示區 -->
            <div class="subtitle-display-panel" id="subtitleDisplayPanel">
                <div class="subtitle-controls">
                    <h3>字幕列表</h3>
                    <div class="subtitle-control-buttons"></div>
                </div>
                <div class="subtitle-display-container" id="subtitleDisplayContainer">
                    <div class="youtube-subtitles-section" id="youtubeSubtitlesSection">
                        <div class="subtitle-upload-controls">
                            <input type="file" id="subtitleFileInput" accept=".srt,.vtt" style="display: none;">
                            <button class="view-mode-toggle subtitle-upload-btn" onclick="document.getElementById('subtitleFileInput').click()">上傳字幕檔</button>
                            <span>支援 .srt, .vtt 格式</span>
                            <div class="subtitle-filter-btns">
                                <button class="filter-btn active" id="filterAll" onclick="filterSubtitlePanel('all')">全部</button>
                                <button class="filter-btn" id="filterModified" onclick="filterSubtitlePanel('modified')">已修改</button>
                            </div>
                        </div>
                        <div id="youtubeSubtitlesPanel" class="youtube-subtitles-panel">
                            <div style="text-align: center; color: var(--text-muted); padding: 40px; font-size: 16px; line-height: 2;">
                                請先載入影片<br>
                                再點擊「上傳字幕檔」按鈕<br>或直接拖曳 .srt / .vtt 字幕檔至此
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 上下可拖曳分隔線 -->
        <div class="vertical-divider" id="verticalDivider"></div>

        <!-- 輸出區域 -->
        <div class="subtitle-section" id="subtitleOutputSection">
            <div class="subtitle-input-panel">
                <div class="output-header">
                    <h3>校正後字幕輸出</h3>
                    <div class="output-format-btns">
                        <button class="view-mode-toggle" id="outputFormatSrt" onclick="switchOutputFormat('srt')" style="background: rgba(34,197,94,0.15); color: var(--success); border-color: rgba(34,197,94,0.3);">SRT</button>
                        <button class="view-mode-toggle" id="outputFormatVtt" onclick="switchOutputFormat('vtt')">VTT</button>
                        <button class="view-mode-toggle" id="outputFormatTxt" onclick="switchOutputFormat('txt')">TXT</button>
                    </div>
                    <div class="output-action-btns">
                        <button class="copy-btn" onclick="copyOutput()">複製</button>
                        <button class="copy-btn" onclick="downloadOutput()">下載整份</button>
                    </div>
                </div>
                <div class="output-options">
                    <label>
                        <input type="checkbox" id="chkOnlyModified" onchange="toggleShowOnlyModified()">
                        僅顯示已修改字幕
                    </label>
                    <label id="chkComparisonLabel" style="display: none; align-items: center; gap: 6px; cursor: pointer;">
                        <input type="checkbox" id="chkComparison" onchange="toggleShowComparison()">
                        顯示校正前後對比
                    </label>
                </div>
                <textarea id="subtitleOutput" placeholder="載入影片後，這裡會自動產生整份校正後的字幕輸出" oninput="onOutputInput()"></textarea>
            </div>
        </div>
    </div>

    <!-- 刪除通知 -->
    <div class="delete-notification" id="deleteNotification"></div>

    <!-- 拖曳覆蓋層 -->
    <div id="dragOverlay">
        <div class="drag-overlay-inner">拖曳影片、音訊或字幕檔（.srt .vtt）至此</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
