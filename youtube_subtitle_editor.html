        function formatSrtTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const ms = Math.round((seconds % 1) * 1000);
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
        }

        function formatVttTime(seconds) {
            return formatSrtTime(seconds).replace(',', '.');
        }

        function buildSubtitleLines(list, getText) {
            if (currentOutputFormat === 'txt') {
                return list.map(s => getText(s)).join('\n');
            }
            const isSrt = currentOutputFormat === 'srt';
            const lines = isSrt ? [] : ['WEBVTT', ''];
            list.forEach((s, i) => {
                const endTime = s.duration ? s.start + s.duration
                    : (list[i + 1] ? list[i + 1].start : s.start + 3);
                const startStr = isSrt ? formatSrtTime(s.start) : formatVttTime(s.start);
                const endStr   = isSrt ? formatSrtTime(endTime)  : formatVttTime(endTime);
                if (isSrt) lines.push(String(i + 1));
                lines.push(`${startStr} --> ${endStr}`);
                lines.push(getText(s));
                lines.push('');
            });
            return lines.join('\n');
        }

        function generateFullOutput() {
            if (!youtubeSubtitles || youtubeSubtitles.length === 0) {
                return buildSubtitleLines(selectedSubtitles, s => s.correctedText);
            }
            const correctionMap = {};
            selectedSubtitles.forEach(s => { correctionMap[s.start] = s.correctedText; });
            const merged = youtubeSubtitles.map(s => ({
                start: s.start,
                duration: s.duration,
                text: correctionMap[s.start] !== undefined ? correctionMap[s.start] : s.text,
            }));
            return buildSubtitleLines(merged, s => s.text);
        }

        function generateOutput() {
            if (showOnlySelected) {
                if (selectedSubtitles.length === 0) return '';
                if (showComparison) {
                    return selectedSubtitles.map((s) => {
                        const ytIndex = youtubeSubtitles.findIndex(yt => yt.start === s.start);
                        const num = ytIndex !== -1 ? ytIndex + 1 : '?';
                        const time = formatTime(s.start);
                        return `#${num} ${time} | ${s.originalText} | ${s.correctedText}`;
                    }).join('\n');
                }
                return buildSubtitleLines(selectedSubtitles, s => s.correctedText);
            }
            return generateFullOutput();
        }

        function updateOutputTextarea() {
            const ta = document.getElementById('subtitleOutput');
            if (ta) ta.value = generateOutput();
        }

        function switchOutputFormat(format) {
            currentOutputFormat = format;
            ['srt', 'vtt', 'txt'].forEach(f => {
                const btn = document.getElementById(`outputFormat${f.charAt(0).toUpperCase() + f.slice(1)}`);
                if (btn) btn.style.background = f === format ? '#2ecc71' : '';
                if (btn) btn.style.color = f === format ? 'white' : '';
            });
            updateOutputTextarea();
        }

        function toggleShowOnlySelected() {
            showOnlySelected = document.getElementById('chkOnlySelected').checked;
            const label = document.getElementById('chkComparisonLabel');
            label.style.display = showOnlySelected ? 'flex' : 'none';
            if (!showOnlySelected) {
                showComparison = false;
                document.getElementById('chkComparison').checked = false;
            }
            updateOutputTextarea();
        }

        function toggleShowComparison() {
            showComparison = document.getElementById('chkComparison').checked;
            updateOutputTextarea();
        }

        function copyOutput() {
            const text = document.getElementById('subtitleOutput').value;
            if (!text) {
                showDeleteNotification('⚠️ 尚無內容可複製', 'error');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showDeleteNotification('📋 已複製到剪貼簿');
            });
        }

        function downloadOutput() {
            if (!youtubeSubtitles?.length && !selectedSubtitles.length) {
                showDeleteNotification('⚠️ 尚無字幕可下載', 'error');
                return;
            }
            const content = generateFullOutput();
            const ext = currentOutputFormat;
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const baseName = (currentFileName || 'corrected_subtitles').replace(/[/\\?%*:|"<>]/g, '-');
            a.download = `${baseName}.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
            showDeleteNotification(`⬇️ 已下載完整校正後字幕 .${ext}`);
        }

        function showMessage(text, type) {
            const container = document.getElementById('messages');
            const message = document.createElement('div');
            message.className = type === 'error' ? 'error-message' : 'success-message';
            message.textContent = text;
            
            container.innerHTML = '';
            container.appendChild(message);
            
            setTimeout(() => {
                if (message.parentNode) {
                    message.remove();
                }
            }, 3000);
        }
        
        function showDeleteNotification(text, type = 'success') {
            const notification = document.getElementById('deleteNotification');
            notification.textContent = text;
            notification.className = 'delete-notification show';
            
            if (type === 'error') {
                notification.classList.add('error');
            } else {
                notification.classList.remove('error');
            }
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }
        
        function addYouTubeSubtitle(index) {
            if (!youtubeSubtitles || index < 0 || index >= youtubeSubtitles.length) {
                showDeleteNotification('無效的字幕索引', 'error');
                return;
            }

            const subtitle = youtubeSubtitles[index];

            // 避免重複新增同一條字幕
            const alreadyAdded = selectedSubtitles.some(s => s.start === subtitle.start && s.originalText === subtitle.text);
            if (alreadyAdded) {
                showDeleteNotification('⚠️ 此字幕已在清單中', 'error');
                return;
            }

            const entry = {
                start: subtitle.start,
                duration: subtitle.duration,
                originalText: subtitle.text,
                correctedText: subtitle.text,
            };

            // 按時間排序插入
            let insertIndex = selectedSubtitles.length;
            for (let i = 0; i < selectedSubtitles.length; i++) {
                if (entry.start < selectedSubtitles[i].start) {
                    insertIndex = i;
                    break;
                }
            }
            selectedSubtitles.splice(insertIndex, 0, entry);

            displaySelectedSubtitles();
            updateOutputTextarea();
            showDeleteNotification(`✅ 已新增: "${subtitle.text}"`, 'success');
        }
        
        let subtitleSyncInterval = null;
        
        function startSubtitleSync() {
            console.log('開始字幕同步...');
            if (subtitleSyncInterval) {
                clearInterval(subtitleSyncInterval);
            }
            
            subtitleSyncInterval = setInterval(() => {
                let currentPlayerTime = 0;
                
                if (isLocalVideo) {
                    if (!localVideo || !isVideoLoaded) return;
                    currentPlayerTime = localVideo.currentTime;
                    isPlaying = !localVideo.paused && !localVideo.ended;
                } else {
                    if (!player || !isPlayerReady || typeof player.getCurrentTime !== 'function') return;
                    try {
                        currentPlayerTime = player.getCurrentTime();
                        if (typeof player.getPlayerState === 'function' && window.YT?.PlayerState) {
                            isPlaying = player.getPlayerState() === YT.PlayerState.PLAYING;
                        }
                    } catch (error) {
                        console.warn('獲取YouTube播放時間失敗:', error);
                        return;
                    }
                }
                
                if (currentPlayerTime >= 0) {
                    console.log('當前播放時間:', currentPlayerTime);
                    updateCurrentTime(currentPlayerTime);
                    highlightCurrentSubtitles(currentPlayerTime);
                }
            }, 500); // 每500毫秒檢查一次
        }
        
        function stopSubtitleSync(clearHighlights = false) {
            if (subtitleSyncInterval) {
                clearInterval(subtitleSyncInterval);
                subtitleSyncInterval = null;
            }
            if (clearHighlights) {
                clearAllHighlights();
            }
        }
        
        function updateCurrentTime(playerTime) {
            currentTime = playerTime;
            updateTimeDisplay();
        }
        
        function highlightCurrentSubtitles(currentPlayerTime) {
            // 找到當前時間對應的字幕
            let currentSubtitle = null;
            if (youtubeSubtitles && youtubeSubtitles.length > 0) {
                for (let i = 0; i < youtubeSubtitles.length; i++) {
                    const subtitle = youtubeSubtitles[i];
                    const nextSubtitle = youtubeSubtitles[i + 1];
                    const startTime = subtitle.start;
                    const endTime = nextSubtitle ? nextSubtitle.start : startTime + 5;
                    
                    if (currentPlayerTime >= startTime && currentPlayerTime < endTime) {
                        currentSubtitle = subtitle;
                        break;
                    }
                }
            }
            
            // 更新字幕覆蓋層文字
            const overlayText = document.getElementById('subtitleOverlayText');
            if (currentSubtitle) {
                overlayText.textContent = currentSubtitle.text;
                overlayText.style.display = 'inline-block';
            } else {
                overlayText.style.display = 'none';
            }
            
            highlightYouTubeSubtitle(currentPlayerTime);
            highlightCorrectedSubtitle(currentPlayerTime);
        }
        
        function highlightYouTubeSubtitle(currentPlayerTime) {
            if (!youtubeSubtitles || youtubeSubtitles.length === 0) {
                return;
            }
            
            const targetIndex = findActiveSubtitleIndex(youtubeSubtitles, currentPlayerTime, 'start', 5);
            
            console.log('YouTube字幕高亮檢查:', {
                currentTime: currentPlayerTime,
                targetIndex,
                currentHighlighted: currentHighlightedYouTube
            });
            
            if (targetIndex === -1) {
                clearYouTubeHighlight();
                return;
            }
            
            // 只有當找到新的字幕且與當前高亮不同時，才切換高亮
            if (targetIndex !== currentHighlightedYouTube) {
                // 清除舊的高亮
                clearYouTubeHighlight(false);
                
                // 設置新的高亮
                currentHighlightedYouTube = targetIndex;
                const items = document.querySelectorAll('.youtube-subtitle-item');
                if (items[targetIndex]) {
                    items[targetIndex].classList.add('current-playing');
                    console.log('設置新的YouTube字幕高亮:', targetIndex);
                    
                    // 確保元素在視圖中可見
                    scrollToElement(items[targetIndex], 'youtubeSubtitlesPanel');
                }
            }
        }
        
        function highlightCorrectedSubtitle(currentPlayerTime) {
            if (!selectedSubtitles || selectedSubtitles.length === 0) {
                return;
            }

            if (window.manualHighlightActive) {
                return;
            }

            const targetIndex = findActiveSubtitleIndex(selectedSubtitles, currentPlayerTime, 'start', 5);

            console.log('已選字幕高亮檢查:', {
                currentTime: currentPlayerTime,
                targetIndex,
                currentHighlighted: currentHighlightedCorrected
            });
            
            if (targetIndex === -1) {
                clearCorrectedHighlight();
                return;
            }
            
            // 只有當找到新的字幕且與當前高亮不同時，才切換高亮
            if (targetIndex !== currentHighlightedCorrected) {
                clearCorrectedHighlight(false);
                
                // 設置新的高亮
                currentHighlightedCorrected = targetIndex;
                const items = document.querySelectorAll('.subtitle-item');
                if (items[targetIndex]) {
                    items[targetIndex].classList.add('current-playing');
                    console.log('設置新的校正字幕高亮:', targetIndex);
                    // 滾動到該位置
                    scrollToElement(items[targetIndex], 'subtitleList');
                }
            }
        }
        
        function findActiveSubtitleIndex(subtitles, currentPlayerTime, timeKey, fallbackDuration, durationKey = null) {
            for (let i = 0; i < subtitles.length; i++) {
                const startTime = Number(subtitles[i][timeKey]);
                if (!Number.isFinite(startTime)) continue;
                
                const nextStartTime = i < subtitles.length - 1 ? Number(subtitles[i + 1][timeKey]) : NaN;
                const ownDuration = durationKey ? Number(subtitles[i][durationKey]) : NaN;
                const endTime = Number.isFinite(ownDuration) && ownDuration > 0
                    ? startTime + Math.max(ownDuration, 0.25)
                    : Number.isFinite(nextStartTime) && nextStartTime > startTime
                    ? nextStartTime
                    : startTime + fallbackDuration;
                
                if (currentPlayerTime >= startTime && currentPlayerTime < endTime) {
                    return i;
                }
            }
            
            return -1;
        }
        
        function clearYouTubeHighlight(resetIndex = true) {
            document.querySelectorAll('.youtube-subtitle-item.current-playing')
                .forEach(item => item.classList.remove('current-playing'));
            if (resetIndex) {
                currentHighlightedYouTube = -1;
            }
        }
        
        function clearCorrectedHighlight(resetIndex = true) {
            document.querySelectorAll('.subtitle-item.current-playing, .subtitle-item.finished')
                .forEach(item => item.classList.remove('current-playing', 'finished'));
            if (resetIndex) {
                currentHighlightedCorrected = -1;
            }
        }
        
        function scrollToElement(element, containerId) {
            const container = document.getElementById(containerId);
            if (container && element) {
                const containerRect = container.getBoundingClientRect();
                const elementRect = element.getBoundingClientRect();
                
                // 計算是否需要滾動
                const isVisible = elementRect.top >= containerRect.top && 
                                elementRect.bottom <= containerRect.bottom;
                
                if (!isVisible) {
                    const scrollTop = element.offsetTop - container.offsetTop - 
                                    (container.clientHeight / 2) + (element.clientHeight / 2);
                    
                    container.scrollTo({
                        top: Math.max(0, scrollTop),
                        behavior: 'smooth'
                    });
                }
            }
        }
        
        function clearAllHighlights() {
            console.log('清除所有高亮樣式');
            
            // 清除YouTube字幕高亮
            document.querySelectorAll('.youtube-subtitle-item.current-playing')
                .forEach(item => {
                    item.classList.remove('current-playing');
                    console.log('清除YouTube字幕高亮');
                });
            
            // 清除校正字幕高亮
            document.querySelectorAll('.subtitle-item.current-playing')
                .forEach(item => {
                    item.classList.remove('current-playing');
                    console.log('清除校正字幕高亮');
                });
            
            // 清除播放完畢的樣式
            document.querySelectorAll('.subtitle-item.finished')
                .forEach(item => {
                    item.classList.remove('finished');
                    console.log('清除播放完畢樣式');
                });
            
            currentHighlightedYouTube = -1;
            currentHighlightedCorrected = -1;
            
            // 重置手動highlight標記
            window.manualHighlightActive = false;
        }
        
        // 初始化頁面時設置鍵盤事件監聽
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化影片載入選擇器
            initVideoLoadSelector();
            
            // 添加鍵盤控制
            document.addEventListener('keydown', function(e) {
                // 如果正在輸入文字，不處理鍵盤控制
                if (e.target.tagName === 'TEXTAREA' || 
                    e.target.tagName === 'INPUT' || 
                    e.target.contentEditable === 'true' ||
                    e.target.closest('[contenteditable="true"]')) {
                    return;
                }
                
                if (e.code === 'BracketLeft') {
                    e.preventDefault();
                    changeSpeed(-1);
                    return;
                }
                if (e.code === 'BracketRight') {
                    e.preventDefault();
                    changeSpeed(1);
                    return;
                }
                if (e.code === 'KeyA') {
                    e.preventDefault();
                    jumpToSubtitle(-1);
                    return;
                }
                if (e.code === 'KeyD') {
                    e.preventDefault();
                    jumpToSubtitle(1);
                    return;
                }

                switch(e.key) {
                    case ' ': // 空格鍵
                        e.preventDefault();
                        if (isPlaying) {
                            controlVideo('pause');
                        } else {
                            controlVideo('play');
                        }
                        break;
                    case 'ArrowLeft': // 左方向鍵
                        e.preventDefault();
                        controlVideo('back');
                        break;
                    case 'ArrowRight': // 右方向鍵
                        e.preventDefault();
                        controlVideo('forward');
                        break;
                }
            });
            
            // 拖曳影片至頁面任意位置
            document.addEventListener('dragover', function(e) {
                if ([...e.dataTransfer.types].includes('Files')) {
                    e.preventDefault();
                    document.getElementById('dragOverlay').classList.add('active');
                }
            });
            document.addEventListener('dragleave', function(e) {
                if (e.relatedTarget === null) {
                    document.getElementById('dragOverlay').classList.remove('active');
                }
            });
            document.addEventListener('drop', function(e) {
                document.getElementById('dragOverlay').classList.remove('active');
                const files = e.dataTransfer.files;
                if (!files || files.length === 0) return;
                const file = files[0];
                const name = file.name.toLowerCase();
                if (file.type.startsWith('video/')) {
                    e.preventDefault();
                    if (!document.getElementById('localVideoBtn').classList.contains('active')) {
                        document.getElementById('localVideoBtn').click();
                    }
                    loadLocalVideoFromFile(file, document.getElementById('loadLocalVideoBtn'));
                } else if (name.endsWith('.srt') || name.endsWith('.vtt') || name.endsWith('.txt')) {
                    e.preventDefault();
                    loadSubtitleFromFile(file);
                }
            });

            // 點選選檔後同步更新檔名顯示
            document.getElementById('localVideoFile').addEventListener('change', function() {
                if (this.files && this.files[0]) {
                    const display = document.getElementById('fileNameDisplay');
                    const zone = document.getElementById('fileDropZone');
                    if (display) display.textContent = this.files[0].name;
                    if (zone) zone.classList.add('has-file');
                }
            });

            console.log('頁面初始化完成，事件監聽器已設定');
        });
        
        // 測試字幕同步功能
        function testSubtitleSync() {
            console.log('=== 測試字幕同步功能 ===');
            console.log('播放器狀態:', { isPlaying, isPlayerReady, isVideoLoaded, isLocalVideo });
            console.log('YouTube字幕數量:', youtubeSubtitles?.length || 0);
            console.log('已選字幕數量:', selectedSubtitles?.length || 0);
            
            if (isLocalVideo) {
                if (localVideo) {
                    const testTime = localVideo.currentTime;
                    console.log('當前本機影片播放時間:', testTime);
                    highlightCurrentSubtitles(testTime);
                    showDeleteNotification(`🧪 測試同步：當前時間 ${formatTime(testTime)}`);
                } else {
                    console.log('本機影片未載入');
                    showDeleteNotification('🧪 本機影片未載入', 'error');
                }
            } else {
                if (player && isPlayerReady) {
                    try {
                        const testTime = player.getCurrentTime();
                        console.log('當前YouTube播放時間:', testTime);
                        highlightCurrentSubtitles(testTime);
                        showDeleteNotification(`🧪 測試同步：當前時間 ${formatTime(testTime)}`);
                    } catch (error) {
                        console.error('測試失敗:', error);
                        showDeleteNotification('🧪 測試失敗：' + error.message, 'error');
                    }
                } else {
                    console.log('播放器未準備好');
                    showDeleteNotification('🧪 播放器未準備好', 'error');
                }
            }
        }
        
        function swapSubtitlePanels() {
            const subtitleDisplayContainer = document.getElementById('subtitleDisplayContainer');
            const youtubeSubtitlesSection = document.querySelector('.youtube-subtitles-section');
            const correctedSubtitlesSection = document.querySelector('.corrected-subtitles-section');
            
            // 取得當前兩個元素的順序
            const isYouTubeFirst = youtubeSubtitlesSection.previousElementSibling === null;
            
            if (isYouTubeFirst) {
                // 如果 YouTube 字幕在前，移動到後面
                subtitleDisplayContainer.appendChild(youtubeSubtitlesSection);
                showDeleteNotification('🔄 已將 YouTube 字幕移到右側');
            } else {
                // 如果校正字幕在前，將 YouTube 字幕移到前面
                subtitleDisplayContainer.insertBefore(youtubeSubtitlesSection, correctedSubtitlesSection);
                showDeleteNotification('🔄 已將 YouTube 字幕移到左側');
            }
        }
        
        function testSubtitleDataSync() {
            console.log('=== 測試字幕資料同步 ===');
            console.log('已選字幕數量:', selectedSubtitles.length);
            console.log('DOM 中字幕項目數量:', document.querySelectorAll('.subtitle-item').length);
            showDeleteNotification(`🧪 同步測試完成 - 已選:${selectedSubtitles.length} DOM:${document.querySelectorAll('.subtitle-item').length}`);
        }

        // 新增：處理字幕檔案上傳
        function loadSubtitleFromFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                try {
                    const subtitles = parseSubtitleFile(content, file.name);
                    if (subtitles && subtitles.length > 0) {
                        youtubeSubtitles = subtitles;
                        updateYouTubeSubtitlesDisplay();
                        if (isLocalVideo && isVideoLoaded && localVideo) {
                            document.getElementById('subtitleOverlay').style.display = 'block';
                            highlightCurrentSubtitles(localVideo.currentTime);
                        }
                        showDeleteNotification(`✅ 成功載入 ${subtitles.length} 條字幕`, 'success');
                    } else {
                        throw new Error('無法解析字幕內容');
                    }
                } catch (error) {
                    console.error('解析字幕檔案失敗:', error);
                    showDeleteNotification('❌ 解析字幕檔案失敗: ' + error.message, 'error');
                }
            };
            reader.onerror = function() {
                showDeleteNotification('❌ 讀取檔案失敗', 'error');
            };
            reader.readAsText(file);
        }

        document.getElementById('subtitleFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            loadSubtitleFromFile(file);
        });

        // 新增：解析字幕檔案
        function parseSubtitleFile(content, filename) {
            const lines = content.split('\n');
            const subtitles = [];
            let currentSubtitle = null;
            let isVTT = filename.toLowerCase().endsWith('.vtt');
            let isSRT = filename.toLowerCase().endsWith('.srt');
            
            // 移除 BOM 和空行
            const cleanLines = lines.map(line => line.trim()).filter(line => line);
            
            if (isVTT) {
                // 處理 VTT 格式
                for (let i = 0; i < cleanLines.length; i++) {
                    const line = cleanLines[i];
                    if (line.includes('-->')) {
                        const timeMatch = line.match(/(\d{2}):(\d{2}):(\d{2})\.(\d{3})/);
                        if (timeMatch) {
                            const hours = parseInt(timeMatch[1]);
                            const minutes = parseInt(timeMatch[2]);
                            const seconds = parseInt(timeMatch[3]);
                            const startTime = hours * 3600 + minutes * 60 + seconds;
                            
                            currentSubtitle = {
                                start: startTime,
                                text: ''
                            };
                        }
                    } else if (currentSubtitle && line && !line.includes('WEBVTT')) {
                        currentSubtitle.text += line + ' ';
                    }
                    
                    if (currentSubtitle && (i === cleanLines.length - 1 || cleanLines[i + 1].includes('-->'))) {
                        if (currentSubtitle.text) {
                            currentSubtitle.text = currentSubtitle.text.trim();
                            subtitles.push(currentSubtitle);
                            currentSubtitle = null;
                        }
                    }
                }
            } else if (isSRT) {
                // 處理 SRT 格式
                for (let i = 0; i < cleanLines.length; i++) {
                    const line = cleanLines[i];
                    if (line.includes('-->')) {
                        const timeMatch = line.match(/(\d{2}):(\d{2}):(\d{2}),(\d{3})/);
                        if (timeMatch) {
                            const hours = parseInt(timeMatch[1]);
                            const minutes = parseInt(timeMatch[2]);
                            const seconds = parseInt(timeMatch[3]);
                            const startTime = hours * 3600 + minutes * 60 + seconds;
                            
                            currentSubtitle = {
                                start: startTime,
                                text: ''
                            };
                        }
                    } else if (currentSubtitle && line && !/^\d+$/.test(line)) {
                        currentSubtitle.text += line + ' ';
                    }
                    
                    if (currentSubtitle && (i === cleanLines.length - 1 || /^\d+$/.test(cleanLines[i + 1]))) {
                        if (currentSubtitle.text) {
                            currentSubtitle.text = currentSubtitle.text.trim();
                            subtitles.push(currentSubtitle);
                            currentSubtitle = null;
                        }
                    }
                }
            } else {
                // 處理一般文字格式（假設每行都是時間戳記後接文字）
                for (let i = 0; i < cleanLines.length; i++) {
                    const line = cleanLines[i];
                    const timeMatch = line.match(/(\d{2}):(\d{2}):(\d{2})/);
                    if (timeMatch) {
                        const hours = parseInt(timeMatch[1]);
                        const minutes = parseInt(timeMatch[2]);
                        const seconds = parseInt(timeMatch[3]);
                        const startTime = hours * 3600 + minutes * 60 + seconds;
                        
                        const text = line.substring(line.indexOf(']') + 1).trim();
                        if (text) {
                            subtitles.push({
                                start: startTime,
                                text: text
                            });
                        }
                    }
                }
            }
            
            // 按時間排序
            subtitles.sort((a, b) => a.start - b.start);
            return subtitles;
        }
    </script>

        <div class="drag-overlay-inner">🎬 放開以載入影片或字幕檔</div>
